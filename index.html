<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* SAME CSS (unchanged) */
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--surface:#111318;--surface2:#1a1d24;--border:#2a2d36;
  --accent:#2563ff;--accent2:#00e5ff;--green:#00d97e;--red:#ff4d6a;--amber:#ffb300;
  --text:#e8eaf0;--muted:#6b7280;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
.app{max-width:760px;margin:auto;padding:20px}
.wallet-btn{padding:10px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;cursor:pointer}
.wallet-btn.connected{border-color:lime;color:lime}
</style>
</head>

<body>
<div class="app">

<h2>⚡ TUSK FARMER</h2>

<button id="walletBtn" class="wallet-btn" onclick="connectWallet()">
  <span id="walletLabel">Connect Wallet</span>
</button>

<br><br>

<button id="runAllBtn" disabled onclick="runAll()">RUN TASKS</button>

<div id="log"></div>

</div>

<!-- Ethers -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>

<script>
let provider, signer, wallet;

function log(msg){
  document.getElementById("log").innerHTML += "<p>"+msg+"</p>";
}

// 🔥 FIXED WALLET CONNECT
async function connectWallet() {
  try {

    if (!window.ethereum) {
      alert("❌ MetaMask not found!\n\n👉 Open this site inside MetaMask browser OR install MetaMask.");
      return;
    }

    log("🔄 Connecting wallet...");

    const accounts = await window.ethereum.request({
      method: "eth_requestAccounts"
    });

    // Switch to Base
    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: "0x2105" }]
      });
    } catch (err) {
      if (err.code === 4902) {
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [{
            chainId: "0x2105",
            chainName: "Base",
            nativeCurrency: {
              name: "ETH",
              symbol: "ETH",
              decimals: 18
            },
            rpcUrls: ["https://mainnet.base.org"],
            blockExplorerUrls: ["https://basescan.org"]
          }]
        });
      } else {
        throw err;
      }
    }

    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    wallet = accounts[0];

    document.getElementById("walletBtn").classList.add("connected");
    document.getElementById("walletLabel").innerText =
      wallet.slice(0,6) + "..." + wallet.slice(-4);

    document.getElementById("runAllBtn").disabled = false;

    log("✅ Connected: " + wallet);

  } catch (err) {
    console.error(err);
    log("❌ Error: " + err.message);
    alert(err.message);
  }
}

// 🔥 LISTENERS (IMPORTANT)
if (window.ethereum) {

  window.ethereum.on("accountsChanged", (accounts) => {
    if (accounts.length === 0) {
      location.reload();
    } else {
      wallet = accounts[0];
      document.getElementById("walletLabel").innerText =
        wallet.slice(0,6) + "..." + wallet.slice(-4);
      log("🔄 Account changed");
    }
  });

  window.ethereum.on("chainChanged", () => {
    log("🔄 Network changed");
    location.reload();
  });
}

// 🔥 TEST TASK (replace with your real tasks)
async function runAll(){
  if(!wallet){
    alert("Connect wallet first");
    return;
  }

  try{
    log("🚀 Sending test transaction...");

    const tx = await signer.sendTransaction({
      to: wallet,
      value: 0n
    });

    log("⏳ Tx sent: " + tx.hash);

    await tx.wait();

    log("✅ Done!");
  }catch(e){
    log("❌ Failed: " + e.message);
  }
}

</script>
</body>
</html>
