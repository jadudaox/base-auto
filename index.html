
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--card:#141720;--card2:#1a1e2a;--border:#2a2f3d;
  --blue:#2563eb;--blue2:#3b82f6;--text:#e8eaf0;--muted:#8892a4;
  --green:#22c55e;--orange:#f97316;--red:#ef4444;--yellow:#eab308;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:0;margin:0}
.app{max-width:420px;margin:0 auto;padding:16px;min-height:100vh}
.header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:14px 16px;background:var(--card);border-radius:14px;border:1px solid var(--border)}
.logo{width:44px;height:44px;background:#2563eb;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;font-family:'Space Mono',monospace}
.header-info{flex:1}
.header-title{font-weight:600;font-size:16px;display:flex;align-items:center;gap:8px}
.badge-active{background:#16a34a22;color:#22c55e;border:1px solid #22c55e44;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-fire{color:var(--orange);font-size:14px}
.header-id{font-size:12px;color:var(--muted);margin-top:2px;font-family:'Space Mono',monospace}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tag{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;color:var(--muted);font-weight:500}
.progress-section{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid var(--border)}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;color:var(--muted)}
.progress-count{font-weight:700;color:var(--text);font-family:'Space Mono',monospace}
.progress-bar{background:#1e2436;border-radius:6px;height:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#3b82f6);border-radius:6px;transition:width 0.5s ease}
.wallet-section{margin-bottom:14px}
.wallet-btn{width:100%;padding:12px;background:#2563eb;border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.wallet-btn:hover{background:#1d4ed8}
.wallet-btn:disabled{opacity:0.5;cursor:not-allowed}
.wallet-connected{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.wallet-dot{width:8px;height:8px;background:var(--green);border-radius:50%}
.wallet-addr{font-size:12px;color:var(--text);font-family:'Space Mono',monospace}
.wallet-bal{font-size:11px;color:var(--muted);margin-top:2px}
.tasks-section{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.tasks-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.tasks-header span{font-size:14px;color:var(--muted)}
.tasks-header .chevron{transition:transform 0.2s;font-size:12px;color:var(--muted)}
.chevron.open{transform:rotate(180deg)}
.tasks-list{padding:6px 0}
.task-item{display:flex;align-items:center;padding:10px 16px;gap:12px;transition:background 0.15s;position:relative}
.task-item:hover{background:var(--card2)}
.task-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.task-check.done{background:#2563eb;border-color:#2563eb}
.task-check.done svg{display:block}
.task-check svg{display:none;width:12px;height:12px}
.task-name{flex:1;font-size:14px;color:var(--text)}
.task-name.done-text{color:var(--muted);text-decoration:line-through}
.task-open{font-size:12px;color:#3b82f6;text-decoration:none;cursor:pointer;font-weight:500;padding:3px 8px;border-radius:6px;transition:background 0.15s}
.task-open:hover{background:#2563eb22}
.task-status{font-size:10px;font-family:'Space Mono',monospace;margin-left:auto;padding:2px 7px;border-radius:10px}
.status-pending{background:#eab30820;color:#eab308}
.status-running{background:#3b82f620;color:#3b82f6;animation:pulse 1s infinite}
.status-done{background:#22c55e20;color:#22c55e}
.status-failed{background:#ef444420;color:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.run-btn{width:100%;padding:14px;background:#2563eb;border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;margin-bottom:10px}
.run-btn:hover:not(:disabled){background:#1d4ed8;transform:translateY(-1px)}
.run-btn:disabled{opacity:0.5;cursor:not-allowed}
.run-btn .icon{font-size:16px}
.switch-btn{width:100%;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.switch-btn:hover{background:var(--card2);color:var(--text)}
.log-section{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:12px 14px;margin-top:10px;max-height:180px;overflow-y:auto}
.log-title{font-size:11px;color:var(--muted);margin-bottom:8px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:1px}
.log-line{font-size:11px;font-family:'Space Mono',monospace;padding:3px 0;border-bottom:1px solid #1e2436;color:var(--muted)}
.log-line.success{color:var(--green)}
.log-line.error{color:var(--red)}
.log-line.info{color:#3b82f6}
.tx-hash{color:#3b82f6;text-decoration:underline;cursor:pointer;word-break:break-all}
.network-badge{background:#0052ff11;border:1px solid #0052ff33;color:#4f8bff;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;font-family:'Space Mono',monospace}
.gas-info{font-size:11px;color:var(--muted);text-align:center;margin-top:8px}
</style>

        <span class="task-name" id="name-erc20">ERC-20</span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
<script>
const BASE_CHAIN_ID = 8453;
const BASE_RPC = 'https://mainnet.base.org';

// Real Base mainnet contracts (low-cost interactions)
const CONTRACTS = {
  gm: { address: '0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89', abi: ['function gm() external'] },
  gn: { address: '0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89', abi: ['function gn() external'] },
  flip: { address: '0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89', abi: ['function flip() external'] },
  dice: { address: '0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89', abi: ['function rollDice() external'] },
  lucky: { address: '0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89', abi: ['function lucky() external'] },
};

// Use real well-known Base contracts for token tasks
// ERC-20: send 0 value transfer to USDC on Base
// ERC-721: interact with a known NFT contract
// ERC-1155: interact with known 1155 contract

const TASK_INFO = {
  gm: { label: 'GM', url: 'https://basescan.org/address/0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89' },
  gn: { label: 'GN', url: 'https://basescan.org/address/0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89' },
  flip: { label: 'Flip', url: 'https://basescan.org/' },
  dice: { label: 'Dice', url: 'https://basescan.org/' },
  lucky: { label: 'Lucky', url: 'https://basescan.org/' },
  erc20: { label: 'ERC-20', url: 'https://basescan.org/token/0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913' },
  erc721: { label: 'ERC-721', url: 'https://opensea.io/collection/base-introduced' },
  erc1155: { label: 'ERC-1155', url: 'https://basescan.org/' },
};

let provider, signer, userAddress;
let tasksDone = {};
let running = false;
let tasksVisible = true;

function addLog(msg, type='') {
  const section = document.getElementById('log-section');
  section.style.display='block';
  const div = document.createElement('div');
  div.className = 'log-line ' + type;
  div.innerHTML = msg;
  document.getElementById('log-lines').appendChild(div);
  section.scrollTop = section.scrollHeight;
}

function setTaskStatus(id, status) {
  const el = document.getElementById('status-' + id);
  if(!el) return;
  el.className = 'task-status';
  if(status === 'running') el.classList.add('status-running');
  else if(status === 'done') el.classList.add('status-done');
  else if(status === 'failed') el.classList.add('status-failed');
  else el.classList.add('status-pending');
  el.textContent = status;
}

function markDone(id) {
  tasksDone[id] = true;
  document.getElementById('check-' + id).classList.add('done');
  document.getElementById('name-' + id).classList.add('done-text');
  setTaskStatus(id, 'done');
  updateProgress();
}

function updateProgress() {
  const done = Object.keys(tasksDone).length;
  document.getElementById('progress-text').textContent = done + '/8';
  document.getElementById('progress-fill').style.width = (done/8*100) + '%';
}

async function connectWallet() {
  if(typeof window.ethereum === 'undefined') {
    addLog('No wallet detected. Please install MetaMask or Coinbase Wallet.', 'error');
    return;
  }
  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    const accounts = await provider.send('eth_requestAccounts', []);
    userAddress = accounts[0];
    signer = await provider.getSigner();

    const network = await provider.getNetwork();
    if(Number(network.chainId) !== BASE_CHAIN_ID) {
      addLog('Wrong network. Switching to Base mainnet...', 'info');
      await switchNetwork();
      provider = new ethers.BrowserProvider(window.ethereum);
      signer = await provider.getSigner();
    }

    const bal = await provider.getBalance(userAddress);
    const balEth = parseFloat(ethers.formatEther(bal)).toFixed(5);

    const ws = document.getElementById('wallet-section');
    ws.innerHTML = `<div class="wallet-connected">
      <div class="wallet-dot"></div>
      <div>
        <div class="wallet-addr">${userAddress.slice(0,6)}...${userAddress.slice(-4)}</div>
        <div class="wallet-bal">${balEth} ETH on Base</div>
      </div>
      <div style="margin-left:auto;font-size:11px;color:var(--green)">Connected</div>
    </div>`;

    document.getElementById('run-btn').disabled = false;
    addLog(`Connected: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`, 'success');
  } catch(e) {
    addLog('Connection failed: ' + e.message, 'error');
  }
}

async function switchNetwork() {
  try {
    await window.ethereum.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: '0x2105' }]
    });
  } catch(e) {
    if(e.code === 4902) {
      await window.ethereum.request({
        method: 'wallet_addEthereumChain',
        params: [{
          chainId: '0x2105',
          chainName: 'Base',
          nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
          rpcUrls: ['https://mainnet.base.org'],
          blockExplorerUrls: ['https://basescan.org']
        }]
      });
    }
  }
}

// Encode calldata for common patterns
function encodeGM() { return '0x' + ethers.id('gm()').slice(2,10); }
function encodeGN() { return '0x' + ethers.id('gn()').slice(2,10); }
function encodeFlip() { return '0x' + ethers.id('flip()').slice(2,10); }
function encodeDice() { return '0x' + ethers.id('roll()').slice(2,10); }
function encodeLucky() { return '0x' + ethers.id('lucky()').slice(2,10); }

// Real known Base contracts for the tasks
const TASK_CONTRACTS = {
  gm:     '0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89',
  gn:     '0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89',
  flip:   '0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89',
  dice:   '0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89',
  lucky:  '0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89',
  erc20:  '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', // USDC on Base
  erc721: '0xd4307e0acd12cf46fd6cf93bc264f5d5d1598792', // Base NFT
  erc1155:'0x7777777F279eba3d3Ad8F4E708545291A6fDBA8B', // Zora 1155 factory
};

async function sendTask(id, toAddress, data, value='0') {
  setTaskStatus(id, 'running');
  addLog(`[${id.toUpperCase()}] Sending transaction...`, 'info');
  try {
    const feeData = await provider.getFeeData();
    const tx = await signer.sendTransaction({
      to: toAddress,
      data: data,
      value: ethers.parseEther(value),
      maxFeePerGas: feeData.maxFeePerGas,
      maxPriorityFeePerGas: feeData.maxPriorityFeePerGas,
    });
    addLog(`[${id.toUpperCase()}] TX sent: <span class="tx-hash" onclick="openLink('https://basescan.org/tx/${tx.hash}')">${tx.hash.slice(0,18)}...</span>`, 'info');
    const receipt = await tx.wait(1);
    const gasUsed = receipt.gasUsed.toString();
    markDone(id);
    addLog(`[${id.toUpperCase()}] Confirmed! Gas used: ${gasUsed}`, 'success');
    return true;
  } catch(e) {
    setTaskStatus(id, 'failed');
    addLog(`[${id.toUpperCase()}] Failed: ${e.reason || e.message}`, 'error');
    return false;
  }
}

// Task definitions with real calldata
const TASK_STEPS = [
  { id: 'gm',     to: TASK_CONTRACTS.gm,     data: () => '0x' + ethers.id('gm()').slice(2,10) },
  { id: 'gn',     to: TASK_CONTRACTS.gn,     data: () => '0x' + ethers.id('gn()').slice(2,10) },
  { id: 'flip',   to: TASK_CONTRACTS.flip,   data: () => '0x' + ethers.id('flip()').slice(2,10) },
  { id: 'dice',   to: TASK_CONTRACTS.dice,   data: () => '0x' + ethers.id('rollDice()').slice(2,10) },
  { id: 'lucky',  to: TASK_CONTRACTS.lucky,  data: () => '0x' + ethers.id('lucky()').slice(2,10) },
  {
    id: 'erc20',
    to: TASK_CONTRACTS.erc20,
    // USDC approve(address,uint256) with 0 amount — valid on-chain call
    data: () => {
      const iface = new ethers.Interface(['function approve(address spender, uint256 amount) returns (bool)']);
      return iface.encodeFunctionData('approve', [userAddress, 0n]);
    }
  },
  {
    id: 'erc721',
    to: TASK_CONTRACTS.erc721,
    // setApprovalForAll to self = no-op safe call
    data: () => {
      const iface = new ethers.Interface(['function setApprovalForAll(address operator, bool approved)']);
      return iface.encodeFunctionData('setApprovalForAll', [userAddress, false]);
    }
  },
  {
    id: 'erc1155',
    to: TASK_CONTRACTS.erc1155,
    // safeTransferFrom with zero value — calls the contract
    data: () => {
      const iface = new ethers.Interface(['function isApprovedForAll(address account, address operator) view returns (bool)']);
      // Use approve-for-all toggle instead (write tx)
      const iface2 = new ethers.Interface(['function setApprovalForAll(address operator, bool approved)']);
      return iface2.encodeFunctionData('setApprovalForAll', [userAddress, false]);
    }
  },
];

async function runAllTasks() {
  if(running || !signer) return;
  running = true;
  document.getElementById('run-btn').disabled = true;
  document.getElementById('run-btn').innerHTML = '<span class="icon">⏳</span> Running...';

  for(const step of TASK_STEPS) {
    if(tasksDone[step.id]) continue;
    await sendTask(step.id, step.to, step.data());
    await new Promise(r => setTimeout(r, 800));
  }

  running = false;
  document.getElementById('run-btn').disabled = false;
  document.getElementById('run-btn').innerHTML = '<span class="icon">⚡</span> Run all steps';
  addLog('All tasks attempted!', 'success');
}

function toggleTasks() {
  tasksVisible = !tasksVisible;
  document.getElementById('tasks-list').style.display = tasksVisible ? 'block' : 'none';
  document.getElementById('chevron').classList.toggle('open', tasksVisible);
  document.getElementById('chevron').textContent = tasksVisible ? '▲' : '▼';
}

function openTask(id) {
  if(TASK_INFO[id]) openLink(TASK_INFO[id].url);
}

function openLink(url) {
  window.open(url, '_blank');
}

// Check if already connected
window.addEventListener('load', async () => {
  if(window.ethereum) {
    try {
      const accounts = await window.ethereum.request({ method: 'eth_accounts' });
      if(accounts.length > 0) connectWallet();
    } catch(e) {}
  }
});
</script>
