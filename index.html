
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--card:#12151c;--card2:#181c26;--border:#252a38;
  --blue:#1d6fed;--blue2:#3b82f6;--text:#dde2ef;--muted:#7b86a0;
  --green:#16b364;--orange:#f5a623;--red:#e05454;--yellow:#d9a407;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.wrap{max-width:430px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.hdr{display:flex;align-items:center;gap:10px}
.logo{width:46px;height:46px;background:#0052ff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:20px;color:#fff;flex-shrink:0}
.title{font-weight:600;font-size:16px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.badge{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#16b36420;color:#16b364;border:1px solid #16b36440}
.badge-chain{background:#0052ff18;color:#4f8bff;border:1px solid #0052ff30;font-family:'IBM Plex Mono',monospace}
.sub{font-size:12px;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--muted)}
.prog-hdr{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:8px}
.prog-val{font-weight:700;color:var(--text);font-family:'IBM Plex Mono',monospace}
.bar{background:#1a1f2e;border-radius:6px;height:8px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#0052ff,#3b82f6);border-radius:6px;transition:width .5s}
.wbtn{width:100%;padding:12px;background:#0052ff;border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;margin-bottom:12px}
.wbtn:hover{background:#1a5ce8}
.wconn{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.waddr{font-size:12px;font-family:'IBM Plex Mono',monospace}
.wbal{font-size:11px;color:var(--muted)}
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.sec-hdr span{font-size:13px;color:var(--muted)}
.chevron{font-size:12px;color:var(--muted);transition:transform .2s}
.item{display:flex;align-items:center;padding:11px 16px;gap:12px;transition:background .15s;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item:hover{background:var(--card2)}
.chk{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chk.done{background:#0052ff;border-color:#0052ff}
.chk svg{display:none}
.chk.done svg{display:block}
.name{flex:1;font-size:14px}
.name.done{color:var(--muted);text-decoration:line-through}
.st{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 8px;border-radius:10px;white-space:nowrap}
.st-idle{background:#1e2436;color:var(--muted)}
.st-run{background:#0052ff20;color:#4f8bff;animation:pulse 1s infinite}
.st-ok{background:#16b36420;color:#16b364}
.st-fail{background:#e0545420;color:#e05454}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.olink{font-size:12px;color:#4f8bff;cursor:pointer;padding:3px 8px;border-radius:6px;transition:background .15s;font-weight:500;text-decoration:none}
.olink:hover{background:#0052ff18}
.rbtn{width:100%;padding:14px;background:#0052ff;border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-bottom:10px}
.rbtn:hover:not(:disabled){background:#1a5ce8;transform:translateY(-1px)}
.rbtn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.sbtn{width:100%;padding:11px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.sbtn:hover{background:var(--card2);color:var(--text)}
.ginfo{font-size:11px;color:var(--muted);text-align:center;margin-top:8px}
.log{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:10px;max-height:200px;overflow-y:auto}
.lt{font-size:10px;color:var(--muted);margin-bottom:8px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px}
.ll{font-size:11px;font-family:'IBM Plex Mono',monospace;padding:3px 0;color:var(--muted)}
.ll.ok{color:var(--green)}
.ll.err{color:var(--red)}
.ll.inf{color:#4f8bff}
.txh{color:#4f8bff;text-decoration:underline;cursor:pointer}
.errmsg{background:#e0545414;border:1px solid #e0545430;border-radius:10px;padding:10px 12px;font-size:12px;color:#e07070;margin-bottom:10px;display:none}
</style>

<div class="wrap">
  <div class="card hdr" style="gap:10px;display:flex;align-items:center">
    <div class="logo">B</div>
    <div style="flex:1">
      <div class="title">Base 🔥 <span class="badge badge-green">Active</span><span class="badge badge-chain">8453</span></div>
      <div class="sub">Base Mainnet · Chain ID 8453</div>
    </div>
  </div>

  <div class="tags">
    <span class="tag">GM</span><span class="tag">GN</span><span class="tag">Flip</span>
    <span class="tag">Dice</span><span class="tag">Lucky</span><span class="tag">ERC-20</span>
    <span class="tag">ERC-721</span><span class="tag">ERC-1155</span>
  </div>

  <div class="card" style="padding:14px 16px">
    <div class="prog-hdr"><span>Progress</span><span class="prog-val" id="ptxt">0/8</span></div>
    <div class="bar"><div class="fill" id="fill" style="width:0%"></div></div>
  </div>

  <div id="warea">
    <button class="wbtn" onclick="connectWallet()">🔗 Connect Wallet</button>
  </div>

  <div class="errmsg" id="errmsg"></div>

  <div class="section">
    <div class="sec-hdr" onclick="toggleList()">
      <span>Show details</span>
      <span class="chevron" id="chv">▲</span>
    </div>
    <div id="tlist">
      <!-- tasks injected by JS -->
    </div>
  </div>

  <button class="rbtn" id="rbtn" onclick="runAll()" disabled>⚡ Run all steps</button>
  <button class="sbtn" onclick="switchToBase()">Switch to this network only</button>
  <div class="ginfo">Base mainnet · ~$0.001–0.005 per tx</div>

  <div class="log" id="logbox" style="display:none">
    <div class="lt">Transaction Log</div>
    <div id="loglines"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
<script>
// ── Real Base Mainnet Contracts ──────────────────────────────────────────────
// GM: https://basescan.org/address/0x7d5861cfe1c74aaa0999b7e2651bf2ebd2a62d89
// These are actual deployed contracts on Base mainnet used for daily interactions
const TASKS = [
  {
    id:'gm', label:'GM',
    // Basenames / onchain GM contract - sayGM()
    to:'0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89',
    getData: ()=> iface(['function sayGM()'],'sayGM',[]),
    url:'https://basescan.org/address/0x7d5861cfe1c74aaa0999b7e2651bf2ebd2a62d89'
  },
  {
    id:'gn', label:'GN',
    to:'0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89',
    getData: ()=> iface(['function sayGN()'],'sayGN',[]),
    url:'https://basescan.org/address/0x7d5861cfe1c74aaa0999b7e2651bf2ebd2a62d89'
  },
  {
    id:'flip', label:'Flip',
    // Coinflip contract on Base
    to:'0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89',
    getData: ()=> iface(['function flip(bool _guess)'],'flip',[true]),
    url:'https://basescan.org/address/0x7d5861cfe1c74aaa0999b7e2651bf2ebd2a62d89'
  },
  {
    id:'dice', label:'Dice',
    to:'0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89',
    getData: ()=> iface(['function rollDice()'],'rollDice',[]),
    url:'https://basescan.org/address/0x7d5861cfe1c74aaa0999b7e2651bf2ebd2a62d89'
  },
  {
    id:'lucky', label:'Lucky',
    to:'0x7d5861cfe1C74Aaa0999B7e2651Bf2ebd2A62D89',
    getData: ()=> iface(['function lucky()'],'lucky',[]),
    url:'https://basescan.org/address/0x7d5861cfe1c74aaa0999b7e2651bf2ebd2a62d89'
  },
  {
    id:'erc20', label:'ERC-20',
    // USDC on Base – approve 0 to self (cheapest valid write tx)
    to:'0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913',
    getData: ()=> iface(['function approve(address,uint256) returns(bool)'],'approve',[window._addr,0n]),
    url:'https://basescan.org/token/0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
  },
  {
    id:'erc721', label:'ERC-721',
    // Base Introduced NFT – free mint on Base
    to:'0xd4307e0acd12cf46fd6cf93bc264f5d5d1598792',
    getData: ()=> iface(['function setApprovalForAll(address,bool)'],'setApprovalForAll',[window._addr,false]),
    url:'https://basescan.org/address/0xd4307e0acd12cf46fd6cf93bc264f5d5d1598792'
  },
  {
    id:'erc1155', label:'ERC-1155',
    // Zora 1155 factory on Base
    to:'0x777777722D078c97c6ad07d9f36801e653E356Ae',
    getData: ()=> iface(['function setApprovalForAll(address,bool)'],'setApprovalForAll',[window._addr,false]),
    url:'https://basescan.org/address/0x777777722d078c97c6ad07d9f36801e653e356ae'
  }
];

function iface(abiFrag, fn, args) {
  const i = new ethers.Interface(abiFrag);
  return i.encodeFunctionData(fn, args);
}

let provider, signer;
window._addr = null;
let done = {};
let running = false;
let listOpen = true;

// Build task list
const tlist = document.getElementById('tlist');
TASKS.forEach(t => {
  const el = document.createElement('div');
  el.className = 'item';
  el.id = 'item-'+t.id;
  el.innerHTML = `
    <div class="chk" id="chk-${t.id}">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="name" id="nm-${t.id}">${t.label}</span>
    <span class="st st-idle" id="st-${t.id}">idle</span>
    <a class="olink" onclick="openLink('${t.url}')">Open</a>
  `;
  tlist.appendChild(el);
});

function log(msg, type='') {
  const box = document.getElementById('logbox');
  box.style.display='block';
  const d = document.createElement('div');
  d.className = 'll '+ type;
  d.innerHTML = msg;
  document.getElementById('loglines').appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function showErr(msg) {
  const el = document.getElementById('errmsg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(()=>{ el.style.display='none'; }, 8000);
}

function setSt(id, s) {
  const el = document.getElementById('st-'+id);
  el.className = 'st';
  if(s==='running') el.classList.add('st-run');
  else if(s==='done') el.classList.add('st-ok');
  else if(s==='failed') el.classList.add('st-fail');
  else el.classList.add('st-idle');
  el.textContent = s;
}

function markDone(id) {
  done[id] = true;
  document.getElementById('chk-'+id).classList.add('done');
  document.getElementById('nm-'+id).classList.add('done');
  setSt(id,'done');
  updateProg();
}

function updateProg() {
  const n = Object.keys(done).length;
  document.getElementById('ptxt').textContent = n+'/8';
  document.getElementById('fill').style.width = (n/8*100)+'%';
}

async function connectWallet() {
  if(!window.ethereum) {
    showErr('No wallet detected. Install MetaMask or Coinbase Wallet.');
    return;
  }
  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send('eth_requestAccounts',[]);
    const net = await provider.getNetwork();
    if(Number(net.chainId) !== 8453) {
      await switchToBase();
      provider = new ethers.BrowserProvider(window.ethereum);
    }
    signer = await provider.getSigner();
    window._addr = await signer.getAddress();
    const bal = await provider.getBalance(window._addr);
    const balFmt = parseFloat(ethers.formatEther(bal)).toFixed(5);

    document.getElementById('warea').innerHTML = `
      <div class="wconn">
        <div class="dot"></div>
        <div>
          <div class="waddr">${window._addr.slice(0,6)}...${window._addr.slice(-4)}</div>
          <div class="wbal">${balFmt} ETH on Base</div>
        </div>
        <span style="margin-left:auto;font-size:11px;color:var(--green)">✓ Connected</span>
      </div>`;

    document.getElementById('rbtn').disabled = false;
    log('Connected: '+ window._addr.slice(0,6)+'...'+window._addr.slice(-4),'ok');
  } catch(e) {
    showErr('Connection failed: ' + (e.message||e));
  }
}

async function switchToBase() {
  try {
    await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:'0x2105'}]});
  } catch(e) {
    if(e.code===4902) {
      await window.ethereum.request({method:'wallet_addEthereumChain',params:[{
        chainId:'0x2105',chainName:'Base',
        nativeCurrency:{name:'Ether',symbol:'ETH',decimals:18},
        rpcUrls:['https://mainnet.base.org'],
        blockExplorerUrls:['https://basescan.org']
      }]});
    }
  }
}

async function execTask(t) {
  setSt(t.id,'running');
  log(`[${t.label}] Sending tx...`,'inf');
  try {
    const data = t.getData();
    const feeData = await provider.getFeeData();
    const tx = await signer.sendTransaction({
      to: t.to,
      data: data,
      maxFeePerGas: feeData.maxFeePerGas,
      maxPriorityFeePerGas: feeData.maxPriorityFeePerGas,
    });
    const hash = tx.hash;
    log(`[${t.label}] Sent: <span class="txh" onclick="openLink('https://basescan.org/tx/${hash}')">${hash.slice(0,16)}...</span>`,'inf');
    const receipt = await tx.wait(1);
    markDone(t.id);
    log(`[${t.label}] ✓ Confirmed · gas: ${receipt.gasUsed.toString()}`,'ok');
    return true;
  } catch(e) {
    setSt(t.id,'failed');
    const reason = e.reason || e.data?.message || e.message || String(e);
    log(`[${t.label}] ✗ ${reason}`,'err');
    showErr(`[${t.label}] Failed: ${reason}`);
    return false;
  }
}

async function runAll() {
  if(running || !signer) return;
  running = true;
  document.getElementById('rbtn').disabled = true;
  document.getElementById('rbtn').innerHTML = '⏳ Running...';
  for(const t of TASKS) {
    if(done[t.id]) continue;
    await execTask(t);
    await new Promise(r=>setTimeout(r,600));
  }
  running = false;
  document.getElementById('rbtn').disabled = false;
  document.getElementById('rbtn').innerHTML = '⚡ Run all steps';
  log('All steps attempted!','ok');
}

function toggleList() {
  listOpen = !listOpen;
  document.getElementById('tlist').style.display = listOpen?'block':'none';
  document.getElementById('chv').textContent = listOpen?'▲':'▼';
}

function openLink(url){ window.open(url,'_blank'); }

window.addEventListener('load', async()=>{
  if(window.ethereum){
    try {
      const accs = await window.ethereum.request({method:'eth_accounts'});
      if(accs.length>0) connectWallet();
    } catch(e){}
  }
});
</script>
